<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRASANKTA - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="theme-config.js"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="Images/prasankta.jpeg" type="Image/jpeg">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-white font-sans transition-colors duration-300 min-h-screen flex flex-col justify-between">

    <nav class="bg-gradient-to-r from-teal-500 to-cyan-600 text-cyan-900 border-b border-gray-100 shadow-sm sticky top-0 z-50 transition-all duration-300 dark:from-gray-800 dark:to-gray-800 dark:text-white dark:border-gray-700" id="main-nav">
        <div class="max-w-7xl mx-auto px-6 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="Images/prasankta.jpeg" alt="PRASANKTA Logo" class="h-14 w-auto object-contain">
                <div class="border-l pl-3 border-gray-200 dark:border-gray-700" id="welcome-divider">
                    <span id="welcome" class="text-sm font-bold block transition-colors">Create your Account</span>
                </div>
            </div>

            <ul class="flex flex-wrap gap-6 text-sm items-center font-medium" id="nav-links">
                <li><a href="home.html" class="menu hover:text-white dark:text-gray-300 transition">Home</a></li>
                <li>
                    <button class="bg-gray-100 hover:bg-gray-300 text-gray-700 text-xs px-3 py-1.5 rounded border border-gray-300 transition" id="dbtn">
                        Dark Mode
                    </button>
                </li>
            </ul>
        </div>
        <div class="h-[3px] bg-gradient-to-r from-teal-500 to-cyan-600 w-full" id="nav-bottom-bar"></div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 my-8">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-8 rounded-2xl shadow-xl w-full max-w-md text-center transition-colors duration-300">
            <div class="flex flex-col items-center mb-6">
                <img src="Images/prasankta.jpeg" alt="PRASANKTA Logo" class="h-20 object-contain mb-3 rounded-xl shadow-sm">
                <h2 class="text-3xl font-extrabold text-gray-800 dark:text-white tracking-wide">PRASANKTA</h2>
                <div class="h-[3px] w-12 bg-cyan-500 mt-2 mb-1"></div>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">e-learning platform</p>
            </div>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-gray-700 dark:text-white font-medium mb-1">Full Name</label>
                    <input type="text" id="name" placeholder="Enter Name" required 
                           class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors bg-white dark:bg-gray-700">
                </div>
                <div>
                    <label class="block text-gray-700 dark:text-white font-medium mb-1">Email Address</label>
                    <input type="email" id="email" placeholder="Enter Email" required 
                           class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors bg-white dark:bg-gray-700">
                </div>
                <div>
                    <label class="block text-gray-700 dark:text-white font-medium mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required 
                           class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors bg-white dark:bg-gray-700">
                </div>
            </div>

            <button onclick="reguser()" class="w-full bg-cyan-600 text-white py-3 rounded-lg font-bold hover:bg-cyan-800 transition duration-300 mt-6 shadow-md tracking-wider uppercase text-sm">
                Create Account
            </button>

            <p class="text-center mt-5 text-gray-600 dark:text-gray-400">
                Already have an account? 
                <a href="login.html" class="text-cyan-600 dark:text-cyan-400 font-bold hover:underline transition-colors ml-1">Login Here</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="theme-toggle.js"></script>
</body>
</html>
