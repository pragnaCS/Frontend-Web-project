<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Cart - PRASANKTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="theme-config.js"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link class="rounded" rel="icon" href="Images/prasankta.jpeg" type="Image/jpg">
</head>

<body class="bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100 font-sans transition-colors duration-300">
    
    <nav class="bg-gradient-to-r from-teal-500 to-cyan-600 dark:from-slate-900 dark:to-cyan-950 text-cyan-900 dark:text-cyan-100 border-b border-gray-100 dark:border-slate-800 shadow-sm sticky top-0 z-50 transition-all duration-300" id="main-nav">
        <div class="max-w-7xl mx-auto px-6 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3">
                <img src="Images/prasankta.jpeg" alt="PRASANKTA Logo" class="h-14 w-auto object-contain rounded-lg">
                <div class="border-l pl-3 border-cyan-700 dark:border-slate-700">
                    <span id="welcome" class="text-sm font-bold block text-cyan-950 dark:text-cyan-200 transition-colors">Welcome, Student!</span>
                </div>
            </div>

            <ul class="flex flex-wrap gap-6 text-sm items-center font-medium" id="nav-links">
                <li><a href="home.html" class="menu hover:text-white dark:hover:text-cyan-400 transition text-cyan-950 dark:text-cyan-200 font-bold">Home</a></li>
                <li><a href="dashboard.html" class="menu hover:text-white dark:hover:text-cyan-400 transition text-cyan-950 dark:text-cyan-200 font-bold">📊 Dashboard</a></li>
                <li>
                    <a href="cart.html" class="menu text-white dark:text-cyan-400 transition font-bold">
                        🛒 Cart (<span id="cartCount">0</span>)
                    </a>
                </li>
                <li>
                    <button class="bg-gray-100 hover:bg-gray-300 text-gray-700 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-200 text-xs px-3 py-1.5 rounded border border-gray-300 dark:border-slate-700 transition" id="dbtn">
                        Dark Mode
                    </button>
                </li>
            </ul>
        </div>
        <div class="h-[3px] bg-gradient-to-r from-teal-500 to-cyan-600 dark:from-teal-600 dark:to-cyan-700 w-full"></div>
    </nav>

    <div class="bg-gray-100 dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto py-3 px-6 text-sm">
            <a href="home.html" class="text-teal-600 dark:text-teal-400 hover:underline">Home</a>
            <span class="mx-2 text-gray-400">/</span>
            <span class="text-cyan-700 dark:text-cyan-300 font-medium">Cart</span>
        </div>
    </div>

    <section class="max-w-7xl mx-auto py-12 px-6">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-800 dark:text-gray-100 tracking-tight">Your Selected Courses</h1>
            <div class="h-[3px] w-24 bg-cyan-500 mx-auto mt-2"></div>
        </div>

        <div id="cartContainer" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12"></div>

        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-md border border-gray-200 dark:border-slate-800 p-8 max-w-xl mx-auto text-center transition-all duration-300">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">
                Selected Total: <span class="text-teal-600 dark:text-teal-400">₹<span id="totalPrice">0</span></span>
            </h2>
            <div class="flex flex-col sm:flex-row justify-center gap-4 mt-6">
                <button onclick="window.location.href='home.html#popularCourses'" class="bg-cyan-600 hover:bg-cyan-700 dark:bg-cyan-700 dark:hover:bg-cyan-600 text-white px-6 py-3 rounded-lg font-semibold transition flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-plus text-xs"></i> Add More Courses
                </button>
                <button onclick="orderSelected()" class="bg-green-600 hover:bg-green-700 dark:bg-emerald-600 dark:hover:bg-emerald-700 text-white px-8 py-3 rounded-lg font-semibold transition flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-circle-check"></i> Proceed to Enroll
                </button>
            </div>
        </div>
    </section>

    <footer class="bg-gray-100 text-gray-700 dark:bg-[#181A1B] dark:text-[#A8A095] pt-12 pb-6 border-t border-gray-200 dark:border-gray-800 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-6 text-center text-xs">
            <p>Copyright 2026 © <span class="text-emerald-600 dark:text-emerald-400 font-semibold uppercase tracking-wide">prasankta e-learning platform</span> | All rights reserved.</p>
        </div>
    </footer>

    <script src="theme-toggle.js"></script>

    <script>
        let cart = [];

        function getUserKey(baseKey) {
            let sessionUser = JSON.parse(localStorage.getItem("loginuser"));
            if (sessionUser && sessionUser.email) {
                return `${baseKey}_${sessionUser.email.trim().toLowerCase()}`;
            }
            return baseKey;
        }

function loadAndMergeCarts() {
    let sessionUser = JSON.parse(localStorage.getItem("loginuser"));

    let enrolledKey = sessionUser ? `enrolledCourses_${sessionUser.email.trim().toLowerCase()}` : "enrolledCourses";
    let enrolledCourses = JSON.parse(localStorage.getItem(enrolledKey)) || [];
    
    let enrolledNames = new Set(enrolledCourses.map(c => c.name.trim().toLowerCase()));

    let primaryCart = JSON.parse(localStorage.getItem(getUserKey("cart"))) || [];
    let checkoutCart = JSON.parse(localStorage.getItem(getUserKey("orderCart"))) || [];
    
    let combinedList = [...primaryCart, ...checkoutCart];
    
    let uniqueCart = [];
    let seenNames = new Set();
    
    combinedList.forEach(item => {
        if (item && item.name) {
            let normalName = item.name.trim().toLowerCase();
            
            if (!seenNames.has(normalName) && !enrolledNames.has(normalName)) {
                seenNames.add(normalName);
                uniqueCart.push(item);
            }
        }
    });

    cart = uniqueCart;
    localStorage.setItem(getUserKey("cart"), JSON.stringify(cart));
}

        document.addEventListener("DOMContentLoaded", function () {
            let sessionUserString = localStorage.getItem("loginuser");
            const welcomeEl = document.getElementById("welcome");
            if (sessionUserString && welcomeEl) {
                try {
                    let sessionUser = JSON.parse(sessionUserString);
                    welcomeEl.innerText = "Welcome, " + (sessionUser.name || sessionUser) + "!";
                } catch (e) {
                    welcomeEl.innerText = "Welcome, " + sessionUserString + "!";
                }
            }
            
            loadAndMergeCarts();
            showCart();
        });

        function showCart() {
            let container = document.getElementById("cartContainer");
            if(!container) return;
            container.innerHTML = "";
            
            let badge = document.getElementById("cartCount");
            if(badge) badge.innerText = cart.length;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="col-span-1 md:col-span-3 py-16 text-center">
                        <i class="fa-solid fa-basket-shopping text-gray-300 dark:text-slate-700 text-6xl mb-4"></i>
                        <h2 class="text-xl font-semibold text-gray-500 dark:text-gray-400">Your cart is empty.</h2>
                    </div>`;
                document.getElementById("totalPrice").innerText = 0;
                return;
            }

            cart.forEach(function(course, index) {
                container.innerHTML += `
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-md border border-gray-200 dark:border-slate-800 relative flex flex-col justify-between hover:shadow-lg transition duration-300">
                        <div class="absolute top-4 left-4">
                            <input type="checkbox" class="courseCheck w-4 h-4 text-teal-600 dark:text-emerald-500 border-gray-300 dark:border-slate-700 rounded focus:ring-teal-500" value="${index}" onchange="calculateTotal()">
                        </div>
                        <div class="mt-4 mb-6">
                            <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">${course.name}</h2>
                            <p class="mt-2 text-base font-semibold text-gray-600 dark:text-gray-400">Price : ₹${course.price}</p>
                        </div>
                        <button onclick="removeCourse(${index})" class="bg-red-50 dark:bg-red-950/40 hover:bg-red-100 dark:hover:bg-red-900/60 text-red-600 dark:text-red-400 px-4 py-2 rounded-lg w-full font-medium transition text-sm flex items-center justify-center gap-2">
                            <i class="fa-solid fa-trash-can text-xs"></i> Remove From Cart
                        </button>
                    </div>
                `;
            });
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll(".courseCheck").forEach(function(check) {
                if (check.checked) {
                    let index = check.value;
                    total += Number(cart[index].price);
                }
            });
            document.getElementById("totalPrice").innerText = total;
        }

        function removeCourse(index) {

    let removedCourseName = cart[index].name.trim().toLowerCase();

    cart.splice(index, 1);
    localStorage.setItem(getUserKey("cart"), JSON.stringify(cart));

    let checkoutCart = JSON.parse(localStorage.getItem(getUserKey("orderCart"))) || [];
    let updatedCheckoutCart = checkoutCart.filter(item => 
        item && item.name && item.name.trim().toLowerCase() !== removedCourseName
    );
    localStorage.setItem(getUserKey("orderCart"), JSON.stringify(updatedCheckoutCart));

    showCart();
}
        function orderSelected() {
            let selected = [];
            let unselected = [];
            let checkboxes = document.querySelectorAll(".courseCheck");

            checkboxes.forEach(function(check) {
                let index = check.value;
                if (check.checked) {
                    selected.push(cart[index]);
                } else {
                    unselected.push(cart[index]);
                }
            });

            if (selected.length === 0) {
                alert("Please select at least one course to enroll.");
                return;
            }

            localStorage.setItem(getUserKey("orderCart"), JSON.stringify(selected));
            
            // unchecked files securely right back inside local cart cache
            localStorage.setItem(getUserKey("cart"), JSON.stringify(unselected));

            window.location.href = "enroll.html";
        }
    </script>
</body>
</html>
